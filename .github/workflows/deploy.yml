name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to LXC
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
          AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL }}

      - name: Deploy to LXC via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LXC_HOST }}
          username: ${{ secrets.LXC_USER }}
          key: ${{ secrets.LXC_SSH_KEY }}
          script: |
            set -e
            cd /opt/trupWebsite
            git pull origin main
            npm ci --omit=dev
            npx prisma migrate deploy
            npm run build
            systemctl restart trupWebsite
            systemctl is-active --quiet trupWebsite && echo "Service running" || (echo "Service failed to start" && exit 1)
