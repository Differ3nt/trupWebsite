name: CI

on:
  push:
    branches: [rewrite/nextjs, main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-build:
    name: Typecheck + Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://placeholder/placeholder

      - name: TypeScript typecheck
        run: npx tsc --noEmit
        env:
          DATABASE_URL: postgresql://placeholder/placeholder
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-placeholder-secret-32-chars-long' }}
          AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID || 'ci-placeholder' }}
          AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET || 'ci-placeholder' }}
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL || 'ci@example.com' }}

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://placeholder/placeholder
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-placeholder-secret-32-chars-long' }}
          AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID || 'ci-placeholder' }}
          AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET || 'ci-placeholder' }}
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL || 'ci@example.com' }}
          SKIP_ENV_VALIDATION: 'true'
